<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderLynk — Commerce rails for community vendors</title>
    <meta name="description" content="Turn social demand into structured orders, secure payments and reliable fulfillment." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: #F5F1E6">
    <div id="root"></div>
    <!-- Resolve the theme before first paint so there's no flash of the wrong theme.
         A manual choice (localStorage) wins; otherwise follow the OS prefers-color-scheme. -->
    <script>
      try {
        var saved = localStorage.getItem('orderlynk.theme')
        var dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.body.style.backgroundColor = '#16140F'
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
