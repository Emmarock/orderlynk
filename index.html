<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderLynk — Commerce rails for community vendors</title>
    <meta name="description" content="Turn social demand into structured orders, secure payments and reliable fulfillment." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: #0a0a0b">
    <div id="root"></div>
    <!-- Apply the saved theme before paint so light-mode users don't flash the dark default. -->
    <script>
      try {
        if (localStorage.getItem('orderlynk.theme') === 'light') {
          document.documentElement.classList.add('light')
          document.body.style.backgroundColor = '#F4EEE1'
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
